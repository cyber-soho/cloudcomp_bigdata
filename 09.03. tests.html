<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Providers Study Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        
        .flashcard-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .is-flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: #3b82f6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 font-sans">

    <div class="max-w-4xl mx-auto p-4 sm:p-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">Cloud Study Center</h1>
            <p class="text-slate-600 mt-2">Master AWS, Azure, GCP, and Alibaba Cloud</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex justify-center space-x-8 border-b border-slate-200 mb-8">
            <button onclick="switchTab('flashcards')" id="tab-flashcards" class="pb-3 px-4 font-semibold text-slate-500 hover:text-blue-500 transition-colors tab-active">
                Flashcards (25)
            </button>
            <button onclick="switchTab('quiz')" id="tab-quiz" class="pb-3 px-4 font-semibold text-slate-500 hover:text-blue-500 transition-colors">
                Practice Quiz (10)
            </button>
        </div>

        <!-- Flashcards View -->
        <div id="view-flashcards" class="animate-fade-in">
            <div class="flex flex-col items-center">
                <div id="flashcard-container" class="w-full max-w-lg aspect-[3/2] perspective-1000 cursor-pointer mb-8">
                    <div class="flashcard-inner relative w-full h-full preserve-3d shadow-xl rounded-2xl border border-slate-200 bg-white" onclick="toggleFlip()">
                        <!-- Front -->
                        <div class="absolute inset-0 backface-hidden flex items-center justify-center p-8 text-center bg-white rounded-2xl">
                            <h2 id="card-front-text" class="text-xl sm:text-2xl font-semibold text-slate-800 leading-tight"></h2>
                        </div>
                        <!-- Back -->
                        <div class="absolute inset-0 backface-hidden rotate-y-180 flex items-center justify-center p-8 text-center bg-blue-50 rounded-2xl border-2 border-blue-200">
                            <p id="card-back-text" class="text-lg sm:text-xl text-slate-700"></p>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex items-center space-x-6">
                    <button onclick="prevCard()" class="p-3 rounded-full bg-white shadow-md hover:bg-slate-100 border border-slate-200 text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <span id="card-progress" class="text-slate-500 font-medium font-mono">1 / 25</span>
                    <button onclick="nextCard()" class="p-3 rounded-full bg-white shadow-md hover:bg-slate-100 border border-slate-200 text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
                <p class="mt-4 text-sm text-slate-400">Click the card to flip</p>
            </div>
        </div>

        <!-- Quiz View -->
        <div id="view-quiz" class="hidden animate-fade-in max-w-2xl mx-auto">
            <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 border border-slate-200">
                <div class="flex justify-between items-center mb-6">
                    <span id="quiz-progress" class="text-sm font-bold text-blue-600 uppercase tracking-wider">Question 1 of 10</span>
                    <div id="score-display" class="hidden font-semibold text-green-600">Score: <span id="current-score">0</span></div>
                </div>

                <h3 id="quiz-question" class="text-xl font-bold text-slate-800 mb-6 leading-relaxed"></h3>

                <div id="quiz-options" class="space-y-3 mb-6">
                    <!-- Options injected here -->
                </div>

                <div id="hint-container" class="mb-6 hidden">
                    <div class="p-4 bg-amber-50 border border-amber-200 rounded-lg text-amber-800 text-sm">
                        <strong>💡 Hint:</strong> <span id="hint-text"></span>
                    </div>
                </div>

                <div id="rationale-container" class="mb-6 hidden">
                    <div id="rationale-box" class="p-4 rounded-lg text-sm border">
                        <p id="rationale-text"></p>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <button id="hint-btn" onclick="showHint()" class="text-blue-500 text-sm font-semibold hover:underline">Show Hint</button>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-md">Next Question</button>
                </div>
            </div>

            <!-- Quiz End State -->
            <div id="quiz-result" class="hidden bg-white rounded-2xl shadow-lg p-10 border border-slate-200 text-center">
                <div class="text-5xl mb-4">🏆</div>
                <h2 class="text-2xl font-bold mb-2">Quiz Complete!</h2>
                <p class="text-slate-600 mb-6">You scored <span id="final-score" class="font-bold text-blue-600"></span> out of 10.</p>
                <button onclick="resetQuiz()" class="px-8 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg">Retake Quiz</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        const flashcardData = [
            { front: "Q3 2025 Global cloud infrastructure market leader", back: "AWS (Amazon Web Services), with approximately 29% market share." },
            { front: "Total estimated value of the cloud infrastructure market in Q3 2025", back: "Approximately $107 billion." },
            { front: "The \"Big Four\" cloud providers", back: "AWS, Microsoft Azure, Google Cloud Platform (GCP), and Alibaba Cloud." },
            { front: "Amazon S3 durability", back: "99.999999999% (eleven nines), meaning statistically one object lost out of ten billion over 10,000 years." },
            { front: "AWS custom silicon chips for machine learning", back: "Trainium (for training) and Inferentia (for inference)." },
            { front: "AWS service for event-driven, serverless computing", back: "AWS Lambda." },
            { front: "Cloud provider with an exclusive partnership with OpenAI", back: "Microsoft Azure." },
            { front: "Azure's primary advantage for enterprise banking and government", back: "Hybrid cloud capabilities through Azure Arc and Azure Stack." },
            { front: "Azure equivalent of AWS S3", back: "Azure Blob Storage." },
            { front: "Azure equivalent of AWS EC2", back: "Azure Virtual Machines." },
            { front: "GCP's fully managed, serverless data warehouse", back: "BigQuery." },
            { front: "BigQuery pricing model", back: "Pay per terabyte scanned (e.g., $6.25/TB) with no idle server costs." },
            { front: "Google's purpose-built AI accelerator chips", back: "TPUs (Tensor Processing Units)." },
            { front: "Cloud provider where Kubernetes was originally developed", back: "Google Cloud Platform (GCP)." },
            { front: "The undisputed cloud market leader in the Asia-Pacific (APAC) region", back: "Alibaba Cloud." },
            { front: "Event that stress-tested Alibaba Cloud at 583,000 orders/second", back: "Singles' Day (11.11) shopping festival." },
            { front: "Alibaba Cloud's open-source family of Large Language Models (LLMs)", back: "Qwen." },
            { front: "Primary reason Western companies use Alibaba Cloud in China", back: "Mandatory compliance with local data residency laws like CSL, PIPL, and DSL." },
            { front: "Neoclouds (e.g., CoreWeave, Lambda Labs)", back: "Cloud providers built specifically for massive AI and GPU workloads, often much cheaper than general-purpose hyperscalers." },
            { front: "Key differentiator for Oracle Cloud Infrastructure (OCI)", back: "The self-tuning Autonomous Database and aggressive pricing undercutting AWS." },
            { front: "Primary target audience for IBM Cloud", back: "Heavily regulated industries requiring stringent compliance frameworks and hybrid cloud via Red Hat OpenShift." },
            { front: "Key differentiator for DigitalOcean", back: "Extreme simplicity and ease of use, targeted at startups, small businesses, and individual developers." },
            { front: "Europe's largest cloud provider, known for strict data sovereignty", back: "OVHcloud." },
            { front: "Significant pricing advantage of OVHcloud over AWS and Azure", back: "No data egress fees." },
            { front: "Fundamental rule of cloud provider selection", back: "There is no universally \"best\" provider; selection depends on workload, budget, geography, and regulations." }
        ];

        const quizData = [
            {
                question: "A data science team accidentally left a cloud instance running over the weekend while training a deep learning model. Based on the typical AWS pipeline cost breakdown, which resource will cause the largest unexpected spike in their monthly bill?",
                hint: "Think about which resource actively performs heavy mathematical processing versus simply holding data passively.",
                options: [
                    { text: "EC2 Compute (GPU instances)", rationale: "Virtual servers with GPU capabilities account for the vast majority of expenses in a machine learning pipeline due to their high hourly rates.", isCorrect: true },
                    { text: "S3 Standard Storage", rationale: "While object storage holds the underlying data, the pay-per-gigabyte cost is typically a very small fraction of the overall machine learning budget.", isCorrect: false },
                    { text: "Lambda Invocations", rationale: "Event-driven execution is highly cost-effective and represents a fraction of a percent of the costs in a heavy model training pipeline.", isCorrect: false },
                    { text: "S3 Glacier Archive", rationale: "Archival storage is designed to be the cheapest tier available and contributes minimally to active project expenses.", isCorrect: false }
                ]
            },
            {
                question: "A highly regulated European bank needs to run machine learning models but is strictly prohibited from moving customer financial records off-premises. However, they want to manage these models through a unified cloud console. Which provider's specific ecosystem feature makes them the strongest candidate?",
                hint: "Focus on the architectural approach that allows cloud software to run on local, physical servers rather than pure cloud-native tools.",
                options: [
                    { text: "Microsoft Azure via Azure Arc", rationale: "This service extends management capabilities to physical, on-premises servers, satisfying strict data residency regulations while maintaining a unified cloud interface.", isCorrect: true },
                    { text: "AWS via Amazon SageMaker", rationale: "This is a pure cloud-native machine learning platform that requires data to be moved into Amazon's infrastructure for processing.", isCorrect: false },
                    { text: "Google Cloud via BigQuery", rationale: "Google's data warehouse operates entirely within the public cloud and is designed for analytics rather than strictly localized, on-premises execution.", isCorrect: false },
                    { text: "Alibaba Cloud via Qwen models", rationale: "This represents an open-source family of language models, not an architectural framework for managing hybrid physical and cloud servers.", isCorrect: false }
                ]
            },
            {
                question: "A retail company has massive datasets but highly unpredictable querying needs—some days they run zero queries, other days they scan petabytes of data for end-of-year reporting. They want to avoid paying for idle servers. Which analytics solution directly aligns with this requirement?",
                hint: "Look for a service described as \"serverless\" and praised for its unique per-terabyte pricing model.",
                options: [
                    { text: "GCP BigQuery", rationale: "This serverless data warehouse charges exclusively based on the volume of data scanned during query execution, eliminating costs for idle computing clusters.", isCorrect: true },
                    { text: "AWS EC2 instances", rationale: "Renting traditional virtual machines means paying an hourly rate regardless of whether the servers are actively processing queries or sitting idle.", isCorrect: false },
                    { text: "Azure Virtual Machines", rationale: "Infrastructure-as-a-Service requires the user to pay for continuous uptime, making unpredictable workloads highly inefficient.", isCorrect: false },
                    { text: "Oracle Autonomous Database", rationale: "Although highly automated, this solution is generally priced based on allocated compute capacity rather than a pure per-query scanning metric.", isCorrect: false }
                ]
            },
            {
                question: "A US-based e-commerce platform is expanding into the Chinese market and needs to set up localized data processing to comply with the Cybersecurity Law (CSL). Which provider is the most legally compliant and native choice?",
                hint: "The legal requirements of the target market dictate the provider.",
                options: [
                    { text: "Alibaba Cloud", rationale: "Natively compliant with strict local data laws, this provider is heavily utilized for operations involving Chinese consumer data.", isCorrect: true },
                    { text: "AWS us-east-1 region", rationale: "Hosting Chinese citizen data in a US data center violates strict Chinese data sovereignty and residency regulations.", isCorrect: false },
                    { text: "DigitalOcean", rationale: "This provider lacks the specialized regional compliance frameworks necessary for major Asian markets.", isCorrect: false },
                    { text: "OVHcloud", rationale: "This provider focuses its compliance and sovereignty efforts primarily on the European Union and GDPR requirements.", isCorrect: false }
                ]
            },
            {
                question: "A solo developer is launching a simple SaaS application. They have a tight budget and no dedicated DevOps team. Which cloud provider is specifically tailored for this simplicity?",
                hint: "Consider the provider described as the \"anti-hyperscaler\" focusing on minimal overhead.",
                options: [
                    { text: "DigitalOcean", rationale: "This platform prioritizes developer experience and simple, low-cost virtual machines without complex enterprise networking overhead.", isCorrect: true },
                    { text: "IBM Cloud", rationale: "Heavily regulated industries utilize this for its complex hybrid cloud and compliance frameworks.", isCorrect: false },
                    { text: "CoreWeave", rationale: "Massive AI training operations utilize this provider exclusively for high-performance GPU compute clusters.", isCorrect: false },
                    { text: "Google Cloud Platform", rationale: "While powerful, hyperscalers introduce steep learning curves and complex management systems a solo dev may not need.", isCorrect: false }
                ]
            },
            {
                question: "An AI startup requires thousands of GPUs but find hyperscalers prohibitively expensive for raw compute. Which category of providers should they investigate?",
                hint: "Look for providers that strip away enterprise extras to offer raw hardware cheaply.",
                options: [
                    { text: "Neoclouds like CoreWeave or Lambda Labs", rationale: "These specialized providers focus exclusively on GPU-as-a-Service at a lower cost than general hyperscalers.", isCorrect: true },
                    { text: "Legacy enterprise giants like IBM", rationale: "These focus on hybrid cloud for enterprise industries rather than raw, low-cost AI hardware.", isCorrect: false },
                    { text: "AWS Lambda", rationale: "Highly efficient for quick code execution, but these time out quickly and aren't suited for prolonged model training.", isCorrect: false },
                    { text: "OVHcloud", rationale: "Competitive for data sovereignty and zero egress fees, but not specialized for massive AI hardware clusters.", isCorrect: false }
                ]
            },
            {
                question: "A healthcare network needs to deploy GPT-4 behind their corporate firewall due to HIPAA. Which cloud environment exclusively supports this?",
                hint: "Recall which major cloud provider invested heavily in the creator of GPT-4.",
                options: [
                    { text: "Azure OpenAI Service", rationale: "Microsoft's exclusive partnership allows enterprises to deploy advanced models securely within their own compliant environments.", isCorrect: true },
                    { text: "AWS Bedrock", rationale: "Lacks access to OpenAI's proprietary models due to corporate exclusivity agreements.", isCorrect: false },
                    { text: "Google Vertex AI", rationale: "Focuses its platform on its own proprietary Gemini models rather than hosting its primary competitor's tech.", isCorrect: false },
                    { text: "Alibaba Tongyi", rationale: "Focuses on Asian services, primarily utilizing the open-source Qwen model family.", isCorrect: false }
                ]
            },
            {
                question: "A media streaming company downloads petabytes of data from the cloud to local servers monthly. Which provider eliminates \"data egress\" fees as a differentiator?",
                hint: "Identify the European provider that focuses on transparent pricing.",
                options: [
                    { text: "OVHcloud", rationale: "This European provider differentiates itself by eliminating fees for transferring data out of its network.", isCorrect: true },
                    { text: "AWS", rationale: "The market leader actively charges substantial fees when customers move large volumes of data out of its ecosystem.", isCorrect: false },
                    { text: "Microsoft Azure", rationale: "Extracting massive datasets from this environment incurs noticeable network egress charges.", isCorrect: false },
                    { text: "Oracle Cloud", rationale: "While cheaper on general compute, the complete elimination of egress fees is the hallmark of OVHcloud.", isCorrect: false }
                ]
            },
            {
                question: "An engineering team leverages Amazon's vertically integrated, custom-built silicon specifically designed for ML training to save money. What hardware are they using?",
                hint: "The hardware shares its name with the phase of the machine learning lifecycle it's for.",
                options: [
                    { text: "Trainium chips", rationale: "Amazon custom-designed these specifically to provide a cost-effective alternative to GPUs for training workloads.", isCorrect: true },
                    { text: "TPUs (Tensor Processing Units)", rationale: "These AI accelerators are exclusively developed and hosted by Google Cloud Platform.", isCorrect: false },
                    { text: "Yitian 710 chips", rationale: "Alibaba Cloud deploys these ARM-based processors within its own data centers.", isCorrect: false },
                    { text: "H100 Tensor Cores", rationale: "These are industry-standard GPUs manufactured by NVIDIA, not Amazon's custom silicon.", isCorrect: false }
                ]
            },
            {
                question: "A data engineer needs an Azure equivalent to Amazon S3 for unstructured data storage. What service should they use?",
                hint: "Look for the name that implies storing large, unstructured chunks of binary data.",
                options: [
                    { text: "Azure Blob Storage", rationale: "Designed for highly durable, unstructured object storage, making it the direct equivalent to Amazon's S3.", isCorrect: true },
                    { text: "Azure SQL Database", rationale: "Manages structured relational tables, acting as the equivalent to Amazon RDS.", isCorrect: false },
                    { text: "Cosmos DB", rationale: "A highly scalable NoSQL database acting as the competitor to Amazon DynamoDB.", isCorrect: false },
                    { text: "Azure Functions", rationale: "Executes event-driven, serverless code, the direct counterpart to AWS Lambda.", isCorrect: false }
                ]
            }
        ];

        // State Management
        let currentCardIndex = 0;
        let currentQuizIndex = 0;
        let score = 0;
        let quizActive = true;

        // Tab Logic
        function switchTab(tab) {
            document.getElementById('view-flashcards').classList.toggle('hidden', tab !== 'flashcards');
            document.getElementById('view-quiz').classList.toggle('hidden', tab !== 'quiz');
            document.getElementById('tab-flashcards').classList.toggle('tab-active', tab === 'flashcards');
            document.getElementById('tab-quiz').classList.toggle('tab-active', tab === 'quiz');
        }

        // Flashcard Logic
        function updateCard() {
            const card = flashcardData[currentCardIndex];
            const container = document.getElementById('flashcard-container');
            container.classList.remove('is-flipped');
            
            setTimeout(() => {
                document.getElementById('card-front-text').textContent = card.front;
                document.getElementById('card-back-text').textContent = card.back;
                document.getElementById('card-progress').textContent = `${currentCardIndex + 1} / ${flashcardData.length}`;
            }, 150);
        }

        function toggleFlip() {
            document.getElementById('flashcard-container').classList.toggle('is-flipped');
        }

        function nextCard() {
            currentCardIndex = (currentCardIndex + 1) % flashcardData.length;
            updateCard();
        }

        function prevCard() {
            currentCardIndex = (currentCardIndex - 1 + flashcardData.length) % flashcardData.length;
            updateCard();
        }

        // Quiz Logic
        function shuffleArray(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateQuiz() {
            if (currentQuizIndex >= quizData.length) {
                showResults();
                return;
            }

            const data = quizData[currentQuizIndex];
            document.getElementById('quiz-progress').textContent = `Question ${currentQuizIndex + 1} of 10`;
            document.getElementById('quiz-question').textContent = data.question;
            document.getElementById('hint-text').textContent = data.hint;
            document.getElementById('hint-container').classList.add('hidden');
            document.getElementById('rationale-container').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('hint-btn').classList.remove('hidden');

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            const shuffledOptions = shuffleArray([...data.options]);
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-200 hover:bg-slate-50 transition-all font-medium text-slate-700";
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(option, btn) {
            const options = document.getElementById('quiz-options').children;
            for (let b of options) b.disabled = true;

            const rationaleBox = document.getElementById('rationale-box');
            const rationaleText = document.getElementById('rationale-text');
            const nextBtn = document.getElementById('next-btn');

            if (option.isCorrect) {
                btn.classList.replace('border-slate-100', 'border-green-500');
                btn.classList.add('bg-green-50');
                rationaleBox.className = "p-4 rounded-lg text-sm border border-green-200 bg-green-50 text-green-800";
                score++;
            } else {
                btn.classList.replace('border-slate-100', 'border-red-500');
                btn.classList.add('bg-red-50');
                rationaleBox.className = "p-4 rounded-lg text-sm border border-red-200 bg-red-50 text-red-800";
            }

            rationaleText.textContent = option.rationale;
            document.getElementById('rationale-container').classList.remove('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
            nextBtn.classList.remove('hidden');
        }

        function showHint() {
            document.getElementById('hint-container').classList.remove('hidden');
            document.getElementById('hint-btn').classList.add('hidden');
        }

        function nextQuestion() {
            currentQuizIndex++;
            updateQuiz();
        }

        function showResults() {
            document.getElementById('view-quiz').querySelector('.bg-white').classList.add('hidden');
            document.getElementById('quiz-result').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
        }

        function resetQuiz() {
            currentQuizIndex = 0;
            score = 0;
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('view-quiz').querySelector('.bg-white').classList.remove('hidden');
            updateQuiz();
        }

        // Init
        window.onload = () => {
            updateCard();
            updateQuiz();
        };
    </script>
</body>
</html>
